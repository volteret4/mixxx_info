server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://mixxx-info:8000/api/;
        proxy_set_header Host $host;
    }

    location /covers/ {
        proxy_pass http://mixxx-info:8000/covers/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
